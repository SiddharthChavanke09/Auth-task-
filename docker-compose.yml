version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: auth-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - auth-network

  app:
    build: .
    container_name: auth-app
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/auth-system?authSource=admin
      JWT_ACCESS_SECRET: my_super_secret_access_key_12345
      JWT_REFRESH_SECRET: my_super_secret_refresh_key_67890
      ACCESS_TOKEN_EXPIRY: 1m
      REFRESH_TOKEN_EXPIRY: 7d
      PORT: 5000
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - auth-network
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  auth-network:
    driver: bridge
